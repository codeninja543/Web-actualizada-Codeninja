    <!-- Runtime configuration: optional /app-config.json served from your hosting root.
         If present it will be loaded synchronously so the app can read API_URL at runtime
         without rebuilding. Example file: { "API_URL": "https://code-ninja5-web.onrender.com" } -->
    <script>
      (function(){
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/app-config.json', false); // synchronous on purpose for early config
          xhr.send(null);
          if (xhr.status === 200) {
            window.__APP_CONFIG = JSON.parse(xhr.responseText);
          } else {
            window.__APP_CONFIG = window.__APP_CONFIG || {};
          }
        } catch (e) {
          window.__APP_CONFIG = window.__APP_CONFIG || {};
        }
      })();
    </script>
